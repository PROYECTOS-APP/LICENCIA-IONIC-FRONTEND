<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text="Volver" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title>Restablecer Contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="gradient-bg">
  <div class="reset-container">
    <div class="icon-container">
      <div class="icon-circle">
        <ion-icon name="lock-open-outline"></ion-icon>
      </div>
    </div>

    <h1 class="title">Nueva Contraseña</h1>
    <p class="subtitle">Ingresa tu nueva contraseña para <strong>{{ email || 'tu correo' }}</strong></p>

    <div class="form-card">
      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input
          [(ngModel)]="newPassword"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Mínimo 6 caracteres"
          label="Nueva contraseña"
          labelPlacement="floating"
          class="custom-input"
          color="light"
        ></ion-input>
        <ion-icon 
          [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" 
          class="password-toggle"
          (click)="togglePassword()"
        ></ion-icon>
      </div>

      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input
          [(ngModel)]="confirmPassword"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Repite tu nueva contraseña"
          label="Confirmar contraseña"
          labelPlacement="floating"
          class="custom-input"
          color="light"
        ></ion-input>
      </div>

      <div class="password-match" *ngIf="confirmPassword">
        <ion-icon [name]="passwordsMatch ? 'checkmark-circle-outline' : 'close-circle-outline'" 
                  [class.match]="passwordsMatch" 
                  [class.no-match]="!passwordsMatch"></ion-icon>
        <span>{{ passwordsMatch ? '✅ Las contraseñas coinciden' : '❌ Las contraseñas no coinciden' }}</span>
      </div>

      <ion-button 
        expand="block" 
        (click)="onReset()" 
        [disabled]="isLoading || !passwordsMatch || newPassword.length < 6 || !email"
        class="reset-button"
      >
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">
          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          RESTABLECER CONTRASEÑA
        </span>
      </ion-button>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span>{{ errorMessage }}</span>
    </div>

    <div *ngIf="successMessage" class="success-message">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <span>{{ successMessage }}</span>
    </div>

    <div class="info-text" *ngIf="email">
      <ion-icon name="mail-outline"></ion-icon>
      <span>Correo: <strong>{{ email }}</strong></span>
    </div>
  </div>
</ion-content>
