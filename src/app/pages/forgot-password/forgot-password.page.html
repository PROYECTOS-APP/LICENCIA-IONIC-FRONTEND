<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text="Volver" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title>Recuperar Contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="gradient-bg">
  <div class="forgot-container">
    <div class="icon-container">
      <div class="icon-circle">
        <ion-icon name="key-outline"></ion-icon>
      </div>
    </div>

    <h1 class="title">¿Olvidaste tu contraseña?</h1>
    <p class="subtitle">Ingresa tu correo y te enviaremos un enlace para restablecerla</p>

    <div class="form-card">
      <div class="input-group">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <ion-input
          [(ngModel)]="email"
          type="email"
          placeholder="correo@ejemplo.com"
          label="Correo electrónico"
          labelPlacement="floating"
          class="custom-input"
          color="light"
        ></ion-input>
      </div>

      <ion-button expand="block" (click)="onSendCode()" [disabled]="isLoading" class="send-button">
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">
          <ion-icon name="send-outline" slot="start"></ion-icon>
          ENVIAR ENLACE
        </span>
      </ion-button>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span>{{ errorMessage }}</span>
    </div>

    <div *ngIf="successMessage" class="success-message">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <span>{{ successMessage }}</span>
    </div>

    <div class="info-text">
      <ion-icon name="information-circle-outline"></ion-icon>
      <span>Revisa tu bandeja de entrada y también la carpeta de <strong>Spam</strong> o <strong>Correo no deseado</strong></span>
    </div>
  </div>
</ion-content>
